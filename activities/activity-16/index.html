<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Styled Form</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

<header>
    <h1>User Registration</h1>
</header>

<main>
    <form>
        <fieldset>
            <legend>Personal Details</legend>

            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="pass">Password:</label>

                <div class="input-column">
                     <input type="password" id="pass" name="pass" required>
                     <a href="#" class="forgot-link">Forgot password?</a>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
            </div>

            <div class="form-group">
                <label for="age">Age:</label>
                <input type="number" id="age" name="age">
            </div>
        </fieldset>

        <fieldset>
            <legend>Preferences</legend>

            <div class="form-group">
                <label for="nationality">Nationality (specific):</label>
                <input type="text" id="nationality" name="nationality">
            </div>

            <div class="form-group">
                <label for="city">Select City:</label>
                <select id="city" name="city">
                    <option value="laie">Laie</option>
                    <option value="Kahuku">Kahuku</option>
                    <option value="Moana St.">Moana St.</option>
                    <option value="Hale">BYUH Hale</option>
                    <option value="Hauula">Hauula</option>
                    <option value="TVA">BYUH TVA</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="specific">If others, please specify:</label>
                <input type="text" id="specific" name="specific">
            </div>

            <div class="form-group inline-group">
                <label>Gender:</label>
                <input type="radio" id="m" name="gen" value="m" required> 
                <label for="m">Male</label>
                <input type="radio" id="f" name="gen" value="f" required> 
                <label for="f">Female</label>
            </div>
            
            <div class="form-group">
                <label for="suggestion">Comment suggestions:</label>
                <textarea id="suggestion" name="suggestion" rows="4"></textarea>
            </div>
            <div class="form-group inline-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the Terms and Conditions</label>
            </div>
        </fieldset>

        <button type="submit" class="my-button">Submit Form</button>
    </form>
</main>

<footer>
    <p>2026 Styled Form | Javan-Goria</p>
</footer>

</body>
</html>
