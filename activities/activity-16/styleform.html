<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Styled Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>User Registration Form</h1>
</header>

<main>
    <form>
        <fieldset>
            <legend>Personal Details</legend>

            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="pass">Password:</label>

                <div class="input-column">
                    <input type="password" id="pass" name="pass" required>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required>
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="dob" required>
            </div>

            <div class="form-group">
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" min="0" max="120" required>
            </div>
        </fieldset>

        <fieldset>
            <legend>Preferences</legend>

            <div class="form-group">
                <label for="nationality">Nationality:</label>
                <input type="text" id="nationality" name="nationality" required>
            </div>

            <div class="form-group">
                <label for="city">Select Location:</label>
                <select id="city" name="city" required>
                    <option value="">--Please choose an option--</option>
                    <option value="hale">BYUH Hale</option>
                    <option value="tva">BYUH Tva</option>
                    <option value="hauula">Hauula</option>
                    <option value="kaneohe">Kaneohe</option>
                    <option value="kahuku">Kahuku</option>
                    <option value="koana St.">Moana St.</option>
                    <option value="other">Other</option>
                </select>
            </div>
                <div class="form-group">
                    <label for="if">if other please specify:</label>
                    <input type="text" id="if" name="if">
                </div>

            <div class="form-group inline-group">
                <label>Gender:</label>
                <input type="radio" id="m" name="gen" value="m" required> <label for="m">Male</label>
                <input type="radio" id="f" name="gen" value="f" required> <label for="f">Female</label>
            </div>

            <div class="form-group"> 
                    <label for="suggestions">Any suggestions:</label>
                    <textarea id="suggestions" name="suggestions" rows="4" cols="50"></textarea>
                </div>

            <div class="form-group inline-group">
                <input type="checkbox" id="terms" name="terms" required> 
                <label for="terms">I agree to the terms and conditions</label>
            </div>
        </fieldset>

        <button type="submit" class="my-button">Submit Form</button>
    </form>
</main>

<footer>
    <p> 2026 Styled Form | Javan-Goria</p>
</footer>

</body>
</html>
