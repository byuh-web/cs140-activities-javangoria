<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nike | Home</title>
    <link rel="stylesheet" href="nike.css">
</head>
<body>

    <!-- Navigation -->
    <header>
        <div class="logo">NIKE</div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Men</a></li>
                <li><a href="#">Women</a></li>
                <li><a href="#">Kids</a></li>
                <li><a href="#">Sale</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-text">
            <h1>JUST DO IT.</h1>
            <p>Discover the latest Nike collection and redefine your performance.</p>
            <button>Shop Now</button>
        </div>
    </section>

    <!-- Featured Products -->
    <section class="products">
        <h2>Featured Products</h2>

        <div class="product-container">

            <div class="card">
                <img src="images.jpg/airmax.jpg" alt="Shoe 1">
                <h3>Nike Air Max</h3>
                <p>$149.99</p>
                <button>Buy Now</button>
            </div>

            <div class="card">
                <img src="images.jpg/revolution.jpg" alt="Shoe 2">
                <h3>Nike Revolution</h3>
                <p>$99.99</p>
                <button>Buy Now</button>
            </div>

            <div class="card">
                <img src="images.jpg/zoomx.jpg" alt="Shoe 3">
                <h3>Nike ZoomX</h3>
                <p>$179.99</p>
                <button>Buy Now</button>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Nike. All Rights Reserved.</p>
    </footer>

</body>
</html>
